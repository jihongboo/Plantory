<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Flat Meme Sticker App Icon</title>
  <desc>A flat vector iOS app icon for a meme/sticker generator app.</desc>

  <!-- Background -->
  <rect x="80" y="70" width="864" height="884" rx="185" fill="#FFD10A"/>

  <!-- Decorative burst lines -->
  <g fill="none" stroke="#1F1F1F" stroke-width="31" stroke-linecap="round">
    <path d="M187 314 L236 320"/>
    <path d="M227 235 L270 282"/>
    <path d="M304 198 L314 257"/>
  </g>

  <!-- Main speech bubble -->
  <path
    d="M512 258
       C333 258 220 385 220 535
       C220 615 254 685 310 732
       C298 778 279 814 259 838
       C249 850 256 867 272 867
       C320 866 369 854 424 823
       C454 833 491 838 529 838
       C707 838 817 717 817 559
       C817 392 690 258 512 258 Z"
    fill="#FFFFFF"
    stroke="#1F1F1F"
    stroke-width="19"
    stroke-linejoin="round"/>

  <!-- Left eye -->
  <ellipse cx="427" cy="498" rx="30" ry="44" fill="#1F1F1F"/>

  <!-- Wink eye -->
  <path
    d="M640 476 L582 522 L651 547"
    fill="none"
    stroke="#1F1F1F"
    stroke-width="29"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Mouth outer -->
  <path
    d="M462 603
       C521 583 585 567 611 564
       C622 563 627 570 628 583
       C633 665 579 706 523 678
       C488 660 466 633 462 603 Z"
    fill="#1F1F1F"/>

  <!-- Tongue -->
  <path
    d="M492 649
       C522 609 570 605 608 621
       C595 658 563 680 526 672
       C512 669 501 661 492 649 Z"
    fill="#FF6268"/>

  <!-- White separation ring behind small emoji -->
  <circle cx="742" cy="727" r="126" fill="#FFFFFF"/>

  <!-- Small emoji face -->
  <circle cx="742" cy="727" r="106" fill="#FFD10A" stroke="#1F1F1F" stroke-width="17"/>

  <!-- Small emoji eyes -->
  <path
    d="M682 714
       C686 691 719 691 723 714"
    fill="none"
    stroke="#1F1F1F"
    stroke-width="17"
    stroke-linecap="round"/>
  <path
    d="M760 714
       C764 691 797 691 801 714"
    fill="none"
    stroke="#1F1F1F"
    stroke-width="17"
    stroke-linecap="round"/>

  <!-- Small emoji smile -->
  <path
    d="M690 766
       C715 797 769 797 795 766"
    fill="none"
    stroke="#1F1F1F"
    stroke-width="16"
    stroke-linecap="round"/>
</svg>
